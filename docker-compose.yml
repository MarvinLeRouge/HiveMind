services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/tests:/app/apps/api/tests
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared/src:/app/packages/shared/src
    env_file:
      - ./apps/api/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.hivemind-api-dev.rule=Host(`hivemind.marvinlerouge.local`) && PathPrefix(`/api`)"
      - "traefik.http.routers.hivemind-api-dev.entrypoints=web"
      - "traefik.http.routers.hivemind-api-dev.middlewares=hivemind-strip-api-dev"
      - "traefik.http.routers.hivemind-api-dev.service=hivemind-backend-dev"
      - "traefik.http.middlewares.hivemind-strip-api-dev.stripprefix.prefixes=/api"
      - "traefik.http.services.hivemind-backend-dev.loadbalancer.server.port=3000"
    networks:
      - traefik-public
      - internal

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    volumes:
      - ./apps/web/src:/app/apps/web/src
    env_file:
      - ./apps/web/.env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.hivemind-frontend-dev.rule=Host(`hivemind.marvinlerouge.local`)"
      - "traefik.http.routers.hivemind-frontend-dev.entrypoints=web"
      - "traefik.http.services.hivemind-frontend-dev.loadbalancer.server.port=5173"
    networks:
      - traefik-public

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: HiveMind
      POSTGRES_PASSWORD: password
      POSTGRES_DB: HiveMind
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U HiveMind -d HiveMind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
