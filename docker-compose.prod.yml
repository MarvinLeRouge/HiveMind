services:
  backend:
    image: ghcr.io/marvinlerouge/hivemind/backend:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    env_file:
      - ./apps/api/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.hivemind-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.hivemind-api.entrypoints=websecure"
      - "traefik.http.routers.hivemind-api.tls=true"
      - "traefik.http.routers.hivemind-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hivemind-api.middlewares=hivemind-strip-api"
      - "traefik.http.routers.hivemind-api.service=hivemind-backend"
      - "traefik.http.middlewares.hivemind-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.hivemind-backend.loadbalancer.server.port=3000"
    networks:
      - traefik-public
      - internal

  frontend:
    image: ghcr.io/marvinlerouge/hivemind/frontend:${IMAGE_TAG:-latest}
    expose:
      - "80"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.hivemind-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.hivemind-frontend.entrypoints=websecure"
      - "traefik.http.routers.hivemind-frontend.tls=true"
      - "traefik.http.routers.hivemind-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.hivemind-frontend.loadbalancer.server.port=80"
    networks:
      - traefik-public

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: HiveMind
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: HiveMind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U HiveMind -d HiveMind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
