services:
  backend:
    image: ghcr.io/marvinlerouge/hivemind/backend:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    env_file:
      - ./apps/api/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  frontend:
    image: ghcr.io/marvinlerouge/hivemind/frontend:${IMAGE_TAG:-latest}
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.hivemind.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.hivemind.entrypoints=websecure"
      - "traefik.http.routers.hivemind.tls.certresolver=letsencrypt"
      - "traefik.http.services.hivemind.loadbalancer.server.port=80"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: HiveMind
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: HiveMind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U HiveMind -d HiveMind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
