coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        # Patch coverage is informational only — doesn't block PRs.
        # Per-flag targets are enforced below.
        informational: true
      backend:
        flags: [backend]
        target: 80%
        informational: false
      frontend:
        flags: [frontend]
        # Will be raised as BLOCK-16+ adds component and composable tests.
        target: 20%
        informational: false

flags:
  backend:
    paths:
      - apps/api/
    carryforward: false
  frontend:
    paths:
      - apps/web/
    carryforward: false

comment:
  layout: reach,diff,flags,files
  behavior: default
  require_changes: true
