coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      # Patch coverage is informational only across all flags.
      # Project coverage (above) is the enforced threshold.
      default:
        informational: true

flags:
  backend:
    paths:
      - apps/api/
    carryforward: false
  frontend:
    paths:
      - apps/web/
    carryforward: false

comment:
  layout: reach,diff,flags,files
  behavior: default
  require_changes: true
