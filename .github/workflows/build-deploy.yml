name: Build & Deploy

on:
  # Triggered automatically after E2E passes on main
  workflow_run:
    workflows: [E2E]
    types: [completed]
    branches: [main]
  # Manual trigger for hotfixes (bypasses E2E gate)
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      # ── Resolve the exact commit SHA and lowercase repo name ────────────────
      - name: Resolve SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      # ── Authenticate with GHCR ───────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build and push images ────────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ steps.sha.outputs.repo }}/backend:latest
            ghcr.io/${{ steps.sha.outputs.repo }}/backend:${{ steps.sha.outputs.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          tags: |
            ghcr.io/${{ steps.sha.outputs.repo }}/frontend:latest
            ghcr.io/${{ steps.sha.outputs.repo }}/frontend:${{ steps.sha.outputs.sha }}

      # ── Deploy to VPS ────────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ steps.sha.outputs.sha }}
          REPO: ${{ steps.sha.outputs.repo }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: GHCR_TOKEN,ACTOR,SHA,REPO
          script: |
            set -Eeuo pipefail

            echo "==> Fetch docker-compose.prod.yml (commit: ${SHA})"
            curl -fsSL \
              "https://raw.githubusercontent.com/${REPO}/${SHA}/docker-compose.prod.yml" \
              -o /home/mlr/marvinlerouge.dev/hivemind/compose/docker-compose.prod.yml

            cd /home/mlr/marvinlerouge.dev/hivemind/compose

            echo "==> Authenticate with GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

            echo "==> Pull new images"
            docker compose -f docker-compose.prod.yml pull

            echo "==> Start database"
            docker compose -f docker-compose.prod.yml up -d db

            echo "==> Wait for database to be healthy"
            timeout 60 sh -c 'until docker compose -f docker-compose.prod.yml exec -T db pg_isready -U HiveMind; do sleep 2; done'

            echo "==> Run pending migrations"
            docker compose -f docker-compose.prod.yml run --rm --no-deps backend \
              node_modules/.bin/prisma migrate deploy

            echo "==> Start all services"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Stack status"
            docker compose -f docker-compose.prod.yml ps
