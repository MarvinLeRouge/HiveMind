name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          timeout 60 bash -c 'until docker compose exec -T backend sh -c "exit 0" 2>/dev/null; do sleep 2; done'

      - name: Run migrations
        run: docker compose exec -T backend sh -c "cd /app/apps/api && npx prisma migrate deploy"

      - name: Seed database
        run: docker compose exec -T backend sh -c "cd /app/apps/api && npx prisma db seed"

      - name: Run Playwright tests
        # E2E suite implemented in BLOCK-22 (V3)
        run: echo "E2E — coming in V3"

      - name: Stop Docker stack
        if: always()
        run: docker compose down
